## 📌 [Track 1] 중학교로 찾아가는 입학설명회 (강당 대형 설명회)

### 1. 부장교사 Professional 브리핑 (강당 전체 진행)
* **컨셉:** 거시적인 신뢰감 형성 및 팩트 기반의 진해고 선택 당위성 제시

* **주요 흐름 (약 15분):**
  1. **Intro:** 진해고의 역사와 지역 사회 내 위상 (명문 공립고의 든든한 안정감)
  2. **Fact Check:** 최근 대입 수시/정시 합격 실적 및 진학 트렌드 분석
  3. **Core Advantage:** 넓은 학생 수 확보를 통한 내신 등급 획득의 유리함 & 과목 선택의 자유 (Track 2 상세 연계)
  4. **Outro:** 든든한 교사진이 학생 개개인의 미래를 설계해주는 학교임을 각인

### 2. 재학생 입학홍보단 '솔직 담백' 토크쇼 & Q&A

#### ① 질문 공백 방지용 '예상 Q&A 큐카드' 시나리오

> [!TIP]
> **운영 팁:** 도우미 학생 2~3명이 무대 위에서 대화형(토크쇼 형식)으로 진행합니다. 사회자 역할을 하는 학생이 큐카드를 보며 질문을 던지고, 패널 학생들이 답하는 방식입니다.

* **여학생들과의 내신 경쟁 스트레스 배제:**
  * 고교 내신 관리에서 꼼꼼하고 감성적인 수행평가 비율이 늘어나면서, 일반 공학 고등학교에서는 남학생들이 내신 1~2등급 구간에서 여학생들에게 밀려 불리함을 겪는 경우가 매우 흔합니다.
  * 진해고등학교는 남학교이므로 이러한 불필요한 성별 내신 편차가 원천 차단되며, 오직 학업 성취도에 기반한 공정하고 유리한 내신 등급 경쟁 환경이 조성됩니다.
* **학교 안에서 해결하는 진로 과목 100% 개설 (선택과목 폐강/통폐합 걱정 Zero):**
  * 고교학점제 하에서 학생들은 자신의 진로에 필요한 과목(기하, 물리학Ⅱ, 화학Ⅱ, 생명과학Ⅱ, 지구과학Ⅱ, 프로그래밍, 인공지능기초 등)을 수강해야 합니다.
  * 소규모 고등학교(학년당 100~150명)는 교사 수급과 수강 인원 부족으로 인해 신청 인원이 10~15명 미만인 과목들은 모두 폐강하거나 다른 학교와 공동교육과정(학교 밖 거점 교육)으로 위탁 이수해야 하므로 학생들의 시공간적 부담이 막대합니다.
  * **진해고등학교는 학년당 약 300명의 풍부한 학생 수 덕분에 본인이 듣고 싶은 과목은 굳이 학교 밖으로 나가지 않고 교내 정규 교육과정 안에서 100% 개설 및 수강이 가능합니다.** 이는 생기부 세특의 깊이와 완성도를 비약적으로 높이는 강력한 치트키입니다.

  * **수시/학종에서의 압도적 강점:** 고교학점제는 학생이 진로에 맞게 과목을 선택하는 것이 핵심입니다. 소규모 학교는 교사 수와 학생 수의 한계로 인해 '물리학 II', '화학 II', '경제', '국제 관계' 등의 심화·융합 과목을 개설하고 싶어도 인원 미달로 개설하지 못하거나 폐강됩니다.
  * **진해고의 해결책:** 다양한 교사 라인업과 넉넉한 학생 수 덕분에, **학생이 원하는 어떤 과목이든 실제 개설이 가능**합니다. 이는 대학 입학사정관에게 "본인의 진로를 위해 적극적으로 도전한 학생"이라는 강한 인상을 주어 학생부종합전형에서 절대적으로 유리합니다.

        // 목차(TOC) 자동 생성 및 수동 앵커 연결
        function generateTOC() {
            const contentDiv = document.getElementById('markdownContent');
            const headings = contentDiv.querySelectorAll('h1, h2, h3');
            const tocList = document.getElementById('tocList');
            tocList.innerHTML = '';

            headings.forEach((heading, index) => {
                // 고유 ID 부여
                const id = 'heading-' + index;
                heading.setAttribute('id', id);

                const li = document.createElement('li');
                li.className = 'toc-item';
                
                // 태그 깊이에 따른 클래스 부여
                if (heading.tagName === 'H1') li.classList.add('toc-h1');
                else if (heading.tagName === 'H2') li.classList.add('toc-h2');
                else if (heading.tagName === 'H3') li.classList.add('toc-h3');

                li.textContent = heading.textContent;
                li.onclick = () => {
                    heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    
                    // 활성 상태 스타일 변경
                    document.querySelectorAll('.toc-item').forEach(item => item.classList.remove('active'));
                    li.classList.add('active');
                };
                tocList.appendChild(li);
            });
        }

        // 글꼴 변경
        function changeFont(fontFamily) {
            document.getElementById('markdownContent').style.fontFamily = fontFamily;
        }

        // 글자 크기 변경
        function changeFontSize(size) {
            document.getElementById('markdownContent').style.fontSize = size;
        }

        // 다크 모드 토글
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const themeBtn = document.getElementById('themeToggle');
            if (document.body.classList.contains('dark-mode')) {
                themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i> 라이트 모드';
            } else {
                themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i> 테마 전환';
            }
        }

        // 맨 위로 스크롤
        function scrollToTop() {
            document.getElementById('docContainer').scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 별표 토글
